<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeterna Vault - Cognitive Insurance Interface</title>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#010410',
                        gold: '#D4AF37',
                        glass: 'rgba(255, 255, 255, 0.03)',
                        glassBorder: 'rgba(212, 175, 55, 0.2)'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Space Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap');
        body { margin: 0; overflow: hidden; background: #010410; color: white; -webkit-font-smoothing: antialiased;}
        
        .ambient-glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.06) 0%, rgba(1,4,16,1) 60%);
            z-index: 0; pointer-events: none;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glassBorder);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 0 40px rgba(212, 175, 55, 0.03);
            border-radius: 24px;
        }

        /* Center AI Orb */
        .ai-orb-container {
            width: 200px; height: 200px; position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .ai-orb {
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #F5D76E, #8a6c1c, #111);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.5), inset -15px -15px 30px rgba(0,0,0,0.8);
            animation: breathe 4s ease-in-out infinite alternate;
        }
        @keyframes breathe {
            0% { transform: scale(0.95); box-shadow: 0 0 30px rgba(212,175,55,0.3); }
            100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(212,175,55,0.7); }
        }
        
        .ai-orb.listening { 
            animation: pulseRapid 0.8s infinite alternate; 
            background: radial-gradient(circle at 30% 30%, #fff, #F5D76E, #111); 
        }
        @keyframes pulseRapid {
            0% { transform: scale(1); box-shadow: 0 0 50px rgba(212,175,55,0.6); }
            100% { transform: scale(1.15); box-shadow: 0 0 100px rgba(255,255,255,0.6); border: 2px solid white; }
        }

        .orb-rings { position:absolute; width:100%; height:100%; border: 1px solid rgba(212,175,55,0.3); border-radius:50%; animation: spinNode 12s linear infinite; }
        .orb-rings::before { content:''; position:absolute; width:10px; height:10px; background:#D4AF37; border-radius:50%; top:-5px; left:50%; box-shadow: 0 0 15px #D4AF37; }
        .orb-rings-reverse { position:absolute; width:120%; height:120%; border: 1px dashed rgba(212,175,55,0.15); border-radius:50%; animation: spinNodeRev 18s linear infinite; }
        @keyframes spinNode { 100% { transform: rotate(360deg); } }
        @keyframes spinNodeRev { 100% { transform: rotate(-360deg); } }

        /* Voice Waveform */
        .waveform { display: flex; gap: 5px; align-items: center; height: 50px; }
        .wave-bar { width: 3px; background: rgba(212,175,55,0.3); border-radius: 4px; height: 6px; transition: height 0.15s ease, background 0.3s; }
        .wave-bar.active { background: #D4AF37; box-shadow: 0 0 10px #D4AF37; animation: eq 0.5s ease-in-out infinite alternate; }
        @keyframes eq { 0% { height: 6px; } 100% { height: 40px; } }

        /* Fade Utils */
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
        
        .fade-out { animation: fadeOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeOut { from { opacity:1; transform: scale(1); } to { opacity:0; transform: scale(0.95); } }

        /* Soft 3D floating animation */
        .float-subtle { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div id="react-root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        let audioCtx;
        function playBlip() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playSuccess() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function AeternaApp() {
            // Flow States: 
            // 0: Init, 1: Extracted & Confirming, 2: Document Missing/Adaptive, 3: Document Verifying, 4: Review, 5: Submitted
            const [step, setStep] = useState(0); 
            const [isListening, setIsListening] = useState(false);
            const [systemText, setSystemText] = useState("I'm here to help. Just tell me what happened.");
            const [systemSubtext, setSystemSubtext] = useState("Tap the center node to speak naturally.");
            
            // Extracted Data
            const [data, setData] = useState({
                type: '-', asset: '-', location: '-', time: '-'
            });

            // Trust Engine
            const [trust, setTrust] = useState({
                identity: 'pending', asset: 'pending', incident: 'pending', risk: 'Calculating...'
            });

            const bars = Array.from({length: 24});
            const srRef = useRef(null);

            const speakText = (txt, onEndCallback = null) => {
                setSystemText(`"${txt}"`);
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(txt);
                utter.pitch = 0.95; utter.rate = 1.05;
                if(onEndCallback) utter.onend = onEndCallback;
                window.speechSynthesis.speak(utter);
            };

            const triggerListen = (expectedIntent) => {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!SpeechRec) {
                    setSystemSubtext("Speech Recognition not supported in this browser. Please use Chrome/Safari.");
                    return;
                }
                
                setIsListening(true);
                setSystemSubtext("Listening...");
                srRef.current = new SpeechRec();
                srRef.current.start();
                
                srRef.current.onresult = (e) => {
                    setIsListening(false);
                    const res = e.results[0][0].transcript.toLowerCase();
                    setSystemSubtext("Processing...");
                    setTimeout(() => processVoice(res, expectedIntent), 500);
                };
                srRef.current.onerror = (e) => {
                    setIsListening(false);
                    setSystemSubtext("Audio connection lost. Tap to try again.");
                };
            };

            const processVoice = (res, intent) => {
                if(intent === 'initial') {
                    // Extract semantics dynamically based on user speech
                    if(res.includes('stolen') || res.includes('theft') || res.includes('robbed') || res.includes('phone') || res.includes('laptop')) {
                        playBlip();
                        const assetExtracted = res.includes('laptop') ? 'Laptop' : 'Phone';
                        const loc = res.includes('chandigarh') ? 'Chandigarh' : 'Unknown';
                        const timeStr = res.includes('yesterday') ? 'Yesterday' : 'Recent';
                        setData({ type: 'Theft', asset: assetExtracted, location: loc, time: timeStr });
                        setStep(1);
                        speakText("Is this correct?", () => triggerListen('confirm_theft'));
                    } 
                    else if (res.includes('health') || res.includes('sick') || res.includes('hospital') || res.includes('accident') || res.includes('fever')) {
                        playBlip();
                        const isAcc = res.includes('accident');
                        setData({ type: isAcc ? 'Accident' : 'Health', asset: 'Personal', location: 'Hospital', time: 'Today' });
                        setStep(1);
                        speakText("Is this correct?", () => triggerListen(isAcc ? 'confirm_accident' : 'confirm_health'));
                    }
                    else if (res.includes('travel') || res.includes('flight') || res.includes('train') || res.includes('delayed') || res.includes('cancelled')) {
                        playBlip();
                        setData({ type: 'Travel', asset: 'Trip', location: 'Airport/Station', time: 'Today' });
                        setStep(1);
                        speakText("Is this correct?", () => triggerListen('confirm_travel'));
                    }
                    else {
                        speakText("I didn't catch the core event. Was it theft, health, or travel?", () => triggerListen('initial'));
                    }
                }
                else if(intent.startsWith('confirm_')) {
                    if(res.includes('yes') || res.includes('confirm') || res.includes('correct') || res.includes('yeah') || res.includes('yep')) {
                        playSuccess();
                        setTrust(p => ({...p, identity: 'Verified ✅'}));
                        const kind = intent.split('_')[1];
                        setStep(2);
                        if (kind === 'theft') {
                            speakText("Do you have the IMEI or should I fetch it?", () => triggerListen('adaptive_answer'));
                        } else if (kind === 'health') {
                            speakText("May I access your health records via ABHA?", () => triggerListen('adaptive_answer'));
                        } else if (kind === 'travel') {
                            speakText("Share your PNR or should I fetch your trips?", () => triggerListen('adaptive_answer'));
                        } else if (kind === 'accident') {
                            speakText("Was this a road accident or personal injury?", () => triggerListen('adaptive_answer'));
                        }
                    } else if (res.includes('no') || res.includes('adjust') || res.includes('wrong')) {
                        setStep(0);
                        setData({ type: '-', asset: '-', location: '-', time: '-' });
                        speakText("Let's restart. Just tell me what happened in your own words.", () => triggerListen('initial'));
                    } else {
                        speakText("Please say yes to confirm or no to restart.", () => triggerListen(intent));
                    }
                }
                else if(intent === 'adaptive_answer') {
                    playBlip();
                    setTrust(p => ({...p, asset: 'Verified ✅'}));
                    
                    if (res.includes("don't have") || res.includes("no") || res.includes("cannot")) {
                        // User confusion handling
                        speakText("No problem. You can continue, but this may delay approval. I can help request it digitally. Should we proceed?", () => triggerListen('proceed'));
                    } else {
                        setStep(3);
                        // Document request
                        speakText("I have fetched the KYC automatically. I still need the official report to proceed. You can just show me the document.", () => setSystemSubtext("Awaiting Document Upload"));
                    }
                }
                else if(intent === 'proceed') {
                     if(res.includes('yes') || res.includes('proceed') || res.includes('continue')) {
                        setStep(3);
                        speakText("Understood. For the missing proof, you can just show me any relevant document now.", () => setSystemSubtext("Awaiting Document Upload"));
                     } else {
                        speakText("We can pause here. Say resume when ready.", () => setSystemSubtext("Paused. Say Resume."));
                     }
                }
                else if(intent === 'final_review') {
                    if(res.includes('yes') || res.includes('submit') || res.includes('confirm')) {
                        playSuccess();
                        setStep(5);
                        speakText("Your claim is submitted. I'll keep tracking it for you.");
                        setSystemSubtext("Session finalized.");
                    } else if (res.includes('edit') || res.includes('change')) {
                        speakText("What would you like to edit? The asset, location, or time?", () => triggerListen('edit_field'));
                    }
                }
            };

            const handleDocumentUpload = () => {
                if (step !== 3) return;
                playBlip();
                setTrust(p => ({...p, incident: 'Verifying ⏳'}));
                speakText("I'm verifying this with official sources.");
                setSystemSubtext("Running OCR and Authenticity checks...");
                
                setTimeout(() => {
                    playSuccess();
                    setTrust(p => ({...p, incident: 'Verified ✅', risk: 'Low'}));
                    setStep(4);
                    speakText("Please review once before I submit.", () => triggerListen('final_review'));
                }, 3000);
            };

            return (
                <div className="w-full h-screen p-10 flex flex-col z-10 relative">
                    
                    {/* Header */}
                    <header className="flex justify-between items-center mb-12">
                        <div className="font-mono text-gold text-3xl tracking-widest font-light drop-shadow-[0_0_10px_rgba(212,175,55,0.4)]">
                            AETERNA VAULT
                        </div>
                        <div className="flex gap-4">
                            <div className="text-gray-400 font-mono text-xs tracking-widest uppercase border border-white/10 px-6 py-2 rounded-full glass-panel">
                                Cognitive Session Active
                            </div>
                        </div>
                    </header>

                    {/* MAIN LAYOUT */}
                    <div className="flex-1 flex justify-between items-stretch max-w-[1600px] mx-auto w-full">
                        
                        {/* LEFT PANEL: Understanding */}
                        <div className="w-80 flex flex-col gap-6">
                            <h2 className="font-mono text-xs font-semibold text-gray-500 uppercase tracking-[0.2em] mb-2 -ml-2">Understanding Your Situation</h2>
                            
                            <div className="glass-panel p-8 flex flex-col gap-6 w-full float-subtle">
                                <DataField label="Event Type" value={data.type === '-' ? 'Listening...' : data.type} />
                                <DataField label="Asset / Subject" value={data.asset} />
                                <DataField label="Time" value={data.time} />
                                <DataField label="Location" value={data.location} />
                            </div>

                            {/* Document Upload Zone - Dynamic */}
                            {step === 3 && (
                                <div className="glass-panel border-dashed border-gold/40 border p-8 text-center mt-4 cursor-pointer hover:bg-gold/5 transition fade-in" onClick={handleDocumentUpload}>
                                    <div className="w-16 h-16 mx-auto bg-gold/10 rounded-full flex items-center justify-center mb-4 border border-gold/20 shadow-[0_0_20px_rgba(212,175,55,0.2)]">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    </div>
                                    <h3 className="font-sans text-sm font-medium text-gold mb-2">Show Document</h3>
                                    <p className="text-gray-400 text-xs font-mono">Upload, scan, or take a photo</p>
                                </div>
                            )}
                        </div>

                        {/* CENTER PANEL: Conversational Core */}
                        <div className="flex-1 flex flex-col items-center justify-center -mt-16">
                            
                            {/* The Orb */}
                            {step < 5 && (
                                <div className="ai-orb-container mb-12 cursor-pointer fade-in" onClick={() => step===0 ? triggerListen('initial') : triggerListen('intent')}>
                                    <div className="orb-rings-reverse"></div>
                                    <div className={`orb-rings ${isListening ? 'animate-pulse' : ''}`}></div>
                                    <div className={`ai-orb ${isListening ? 'listening' : ''}`}></div>
                                </div>
                            )}

                            {/* System Text Overlay */}
                            <div className="max-w-2xl text-center flex flex-col items-center">
                                <h1 className="font-sans text-3xl md:text-4xl font-light text-white leading-tight drop-shadow-lg mb-4 text-center">
                                    {systemText}
                                </h1>
                                {step < 4 && (
                                     <p className="font-mono text-xs text-gold/70 tracking-widest uppercase">
                                        {systemSubtext}
                                     </p>
                                )}
                            </div>

                            {/* Floating Context Cards */}
                            {step === 1 && (
                                <div className="glass-panel p-8 w-[400px] mt-12 text-center fade-in float-subtle border-gold/30">
                                    <p className="font-mono text-xs text-gold/80 uppercase tracking-widest mb-6">I understood this:</p>
                                    <div className="space-y-4 mb-8 text-left bg-black/40 p-6 rounded-2xl border border-white/5">
                                        <div className="flex justify-between items-center"><span className="text-gray-500 font-mono text-xs uppercase">Type</span> <span className="font-medium text-lg">{data.type}</span></div>
                                        <div className="flex justify-between items-center"><span className="text-gray-500 font-mono text-xs uppercase">Subject</span> <span className="font-medium text-lg">{data.asset}</span></div>
                                        <div className="flex justify-between items-center"><span className="text-gray-500 font-mono text-xs uppercase">Location</span> <span className="font-medium text-lg">{data.location}</span></div>
                                        <div className="flex justify-between items-center"><span className="text-gray-500 font-mono text-xs uppercase">Time</span> <span className="font-medium text-lg">{data.time}</span></div>
                                    </div>
                                    <div className="flex justify-center gap-4 text-sm font-sans font-medium">
                                        <button onClick={() => processVoice('yes', 'confirm_theft')} className="px-6 py-3 bg-gold text-black rounded-full hover:bg-yellow-400 transition shadow-[0_0_20px_rgba(212,175,55,0.3)]">✔ Confirm</button>
                                        <button onClick={() => processVoice('no', 'confirm_theft')} className="px-6 py-3 border border-white/20 text-white rounded-full hover:bg-white/10 transition">✏ Adjust (Speak)</button>
                                    </div>
                                </div>
                            )}

                            {/* Review Screen */}
                            {step === 4 && (
                                <div className="glass-panel p-10 w-[500px] mt-8 fade-in border-gold/40 shadow-[0_0_80px_rgba(212,175,55,0.15)] float-subtle">
                                    <p className="font-sans text-xl text-gold font-light mb-8 text-center letter-spacing-tight">Here's your claim:</p>
                                    <div className="space-y-5 font-mono text-sm mb-10 bg-black/30 p-6 rounded-xl border border-white/5">
                                        <div className="flex justify-between border-b border-white/10 pb-3"><span className="text-gray-500 uppercase text-xs">Event</span><span className="text-white">{data.type}</span></div>
                                        <div className="flex justify-between border-b border-white/10 pb-3"><span className="text-gray-500 uppercase text-xs">Asset</span><span className="text-white">{data.asset}</span></div>
                                        <div className="flex justify-between border-b border-white/10 pb-3"><span className="text-gray-500 uppercase text-xs">When & Where</span><span className="text-white">{data.time}, {data.location}</span></div>
                                        <div className="flex justify-between"><span className="text-gray-500 uppercase text-xs">Attached Proofs</span><span className="text-green-400">Validated Doc + API Sync</span></div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => processVoice('edit', 'final_review')} className="flex-1 py-4 border border-white/20 text-white font-medium rounded-xl hover:bg-white/5 transition">Edit</button>
                                        <button onClick={() => processVoice('submit', 'final_review')} className="flex-[2] py-4 bg-gold text-black font-semibold rounded-xl hover:bg-yellow-400 transition shadow-[0_0_30px_rgba(212,175,55,0.4)]">
                                            Confirm & Submit
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Success Screen */}
                            {step === 5 && (
                                <div className="text-center mt-12 fade-in">
                                    <div className="w-24 h-24 bg-green-500/10 border-2 border-green-400 rounded-full flex items-center justify-center text-4xl mx-auto mb-8 shadow-[0_0_50px_rgba(34,197,94,0.3)] text-green-400">✓</div>
                                    <h2 className="text-2xl font-sans font-light text-white mb-2">Claim Synchronized</h2>
                                    <p className="text-gray-400 font-mono text-sm">Blockchain ledger updated. Claim ID: AE-9942</p>
                                </div>
                            )}

                        </div>

                        {/* RIGHT PANEL: Live Trust Engine */}
                        <div className="w-80 flex flex-col gap-6">
                            <h2 className="font-mono text-xs font-semibold text-gray-500 uppercase tracking-[0.2em] mb-2 text-right -mr-2">Verification Progress</h2>
                            
                            <div className="glass-panel p-8 float-subtle">
                                <div className="space-y-8">
                                    <VerificationRow label="Identity Check" status={trust.identity} />
                                    <VerificationRow label="Asset Authenticity" status={trust.asset} />
                                    <VerificationRow label="Event Verification" status={trust.incident} />
                                    
                                    <div className="pt-8 border-t border-white/10 mt-2">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="font-mono text-[10px] text-gray-500 uppercase tracking-widest">Fraud Risk Signal</span>
                                            <span className={`font-mono text-xs font-bold ${trust.risk === 'Low' ? 'text-green-400' : 'text-gold animate-pulse'}`}>{trust.risk}</span>
                                        </div>
                                        <div className="w-full h-1.5 bg-black/40 rounded-full overflow-hidden border border-white/5">
                                            <div className={`h-full transition-all duration-1000 ${trust.risk==='Low'?'w-12 bg-green-400 shadow-[0_0_10px_#4ade80]':'w-full bg-gold/50 animate-pulse'}`}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* Footer Waveform */}
                    <div className="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-4">
                        <div className="waveform">
                            {bars.map((_, i) => (
                                <div key={i} className={`wave-bar ${isListening ? 'active' : ''}`} style={{animationDelay: `${Math.random()}s`}}></div>
                            ))}
                        </div>
                        <span className="font-mono text-[10px] tracking-[0.3em] text-gray-600 uppercase">
                            {isListening ? 'ACOUSTIC SENSOR ACTIVE' : 'AWAITING VOCAL INPUT'}
                        </span>
                    </div>

                </div>
            );
        }

        function DataField({label, value}) {
            const isEmpty = value === '-' || value === 'Listening...';
            return (
                <div className="flex flex-col gap-1 border-b border-white/5 pb-4 last:border-0 last:pb-0">
                    <div className="font-mono text-[10px] uppercase tracking-widest text-gray-500">{label}</div>
                    <div className={`font-sans text-base transition-colors ${isEmpty ? 'text-gray-600 italic' : 'text-white font-medium'}`}>{value}</div>
                </div>
            );
        }

        function VerificationRow({label, status}) {
            const isPending = status === 'pending';
            const isVerifying = status === 'Verifying ⏳';
            return (
                <div className="flex justify-between items-center group">
                    <span className="font-sans text-sm text-gray-400 group-hover:text-white transition-colors">{label}</span>
                    <span className="text-sm font-mono flex items-center">
                        {isPending ? <span className="text-gray-600 opacity-50 block animate-spin">◒</span> : 
                         isVerifying ? <span className="text-gold animate-pulse">⏳</span> : 
                         <span className="text-green-400 drop-shadow-[0_0_8px_rgba(34,197,94,0.4)]">{status}</span>}
                    </span>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('react-root'));
        root.render(<AeternaApp />);
    </script>
</body>
</html>
