<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETERNA VAULT - Cognitive Insurance</title>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#050A1F',
                        gold: '#D4AF37',
                        glass: 'rgba(5, 10, 31, 0.6)'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Space Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Voiceflow Injection -->
    <script type="text/javascript">
      (function(d, t) {
          var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
          v.onload = function() {
            window.voiceflow.chat.load({
              verify: { projectID: '69e1b38618d5b8d8b666412e' },
              url: 'https://general-runtime.voiceflow.com',
              versionID: 'production',
              voice: { url: "https://runtime-api.voiceflow.com" }
            });
          }
          v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
      })(document, 'script');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap');
        body { margin: 0; overflow: hidden; background: #02050f; color: white; -webkit-font-smoothing: antialiased;}
        
        .ambient-glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, rgba(5,10,31,0) 70%);
            z-index: 0; pointer-events: none;
        }

        .glass-panel {
            background: rgba(10, 15, 40, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 20px rgba(212, 175, 55, 0.05);
        }

        /* Center AI Orb */
        .ai-orb-container {
            width: 180px; height: 180px; position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .ai-orb {
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #D4AF37, #8a6c1c, #111);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), inset -10px -10px 20px rgba(0,0,0,0.8);
            animation: breathe 4s ease-in-out infinite alternate;
        }
        @keyframes breathe {
            0% { transform: scale(0.95); box-shadow: 0 0 25px rgba(212,175,55,0.3); }
            100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(212,175,55,0.6); }
        }
        
        .ai-orb.listening { animation: pulseRapid 0.6s infinite alternate; background: radial-gradient(circle at 30% 30%, #fff, #D4AF37, #111); }
        @keyframes pulseRapid {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(212,175,55,0.6); }
            100% { transform: scale(1.15); box-shadow: 0 0 80px rgba(255,255,255,0.6); border: 2px solid white; }
        }

        .orb-rings { position:absolute; width:100%; height:100%; border: 1px solid rgba(212,175,55,0.2); border-radius:50%; animation: spinNode 10s linear infinite; }
        .orb-rings::before { content:''; position:absolute; width:8px; height:8px; background:var(--gold); border-radius:50%; top:-4px; left:50%; box-shadow: 0 0 10px var(--gold); }
        @keyframes spinNode { 100% { transform: rotate(360deg); } }

        /* Voice Waveform */
        .waveform { display: flex; gap: 4px; align-items: center; height: 40px; }
        .wave-bar { width: 3px; background: var(--gold); border-radius: 4px; height: 4px; transition: height 0.1s ease; }
        .wave-bar.active { animation: eq 0.6s ease-in-out infinite alternate; }
        @keyframes eq { 0% { height: 4px; opacity:0.4; } 100% { height: 40px; opacity:1; box-shadow: 0 0 10px var(--gold); } }

        /* Fade Utils */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div id="react-root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // TTS Audio Context for subtle sounds
        let audioCtx;
        function playBlip() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playSuccess() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }


        function AeternaApp() {
            // Flow States: 0: Init, 1: Understood, 2: Document, 3: Review, 4: Success
            const [step, setStep] = useState(0); 
            const [isListening, setIsListening] = useState(false);
            const [systemText, setSystemText] = useState("I'm here to help. Just tap the microphone and tell me what happened.");
            
            // Extracted Data
            const [data, setData] = useState({
                type: '-', asset: '-', location: '-', time: '-'
            });

            // Trust Engine
            const [trust, setTrust] = useState({
                identity: 'pending', asset: 'pending', incident: 'pending', risk: 'Calculating...'
            });

            // Waveform bars
            const bars = Array.from({length: 20});

            // Executive Voice Agent
            const speak = (txt, onEndCallback = null) => {
                setSystemText(txt);
                const utter = new SpeechSynthesisUtterance(txt);
                utter.pitch = 0.9; utter.rate = 1.05;
                if(onEndCallback) utter.onend = onEndCallback;
                window.speechSynthesis.speak(utter);
            };

            const triggerListen = (expectedIntent) => {
                // Audio init hack
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!SpeechRec) return alert("Web Speech Not Supported.");
                
                setIsListening(true);
                const sr = new SpeechRec();
                sr.start();
                
                sr.onresult = (e) => {
                    setIsListening(false);
                    const res = e.results[0][0].transcript.toLowerCase();
                    processVoice(res, expectedIntent);
                };
                sr.onerror = () => setIsListening(false);
            };

            const processVoice = (res, intent) => {
                if(intent === 'initial') {
                    if(res.includes('stolen') || res.includes('phone') || res.includes('chandigarh')) {
                        // AI understands structured data
                        playBlip();
                        setData({ type: 'Theft', asset: 'Phone', location: 'Chandigarh', time: 'Yesterday' });
                        setStep(1);
                        speak("I have understood your situation. Is this correct?", () => triggerListen('confirm_1'));
                    } else {
                        speak("I didn't quite catch that. Could you repeat?", () => triggerListen('initial'));
                    }
                }
                else if(intent === 'confirm_1') {
                    if(res.includes('yes') || res.includes('confirm') || res.includes('correct')) {
                        playBlip();
                        setTrust(p => ({...p, identity: 'verified'}));
                        speak("Do you have the IMEI or should I securely fetch it directly from your device?", () => triggerListen('fetch'));
                    } else {
                       speak("Let's restart. What happened?", () => triggerListen('initial'));
                    }
                }
                else if(intent === 'fetch') {
                    playSuccess();
                    setTrust(p => ({...p, asset: 'verified'}));
                    setStep(2);
                    speak("Asset verified cryptographically. Now, you can just show me any relevant document, like an F I R, by dragging it here.");
                }
                else if(intent === 'final_review') {
                    if(res.includes('yes') || res.includes('submit')) {
                        playSuccess();
                        setStep(4);
                        speak("Your claim is submitted. The blockchain ledger is now tracking your resolution. I will monitor it for you.");
                    }
                }
            };

            const handleDocumentDrop = () => {
                playBlip();
                setTrust(p => ({...p, incident: 'verified', risk: 'Low'}));
                setStep(3);
                speak("Document ingested and verified. Please review the final claim before I submit to the ledger.", () => triggerListen('final_review'));
            };

            return (
                <div className="w-full h-screen p-8 flex flex-col z-10 relative">
                    
                    {/* Header */}
                    <header className="flex justify-between items-center mb-10">
                        <div className="font-mono text-gold text-2xl tracking-widest font-bold drop-shadow-[0_0_10px_rgba(212,175,55,0.6)]">
                            AETERNA VAULT
                        </div>
                        <div className="text-gray-400 font-mono text-[10px] tracking-widest uppercase border border-gray-600/30 px-4 py-2 rounded-full backdrop-blur-md">
                            Live Cognitive Session
                        </div>
                    </header>

                    {/* MAIN LAYOUT */}
                    <div className="flex-1 flex justify-between items-stretch">
                        
                        {/* LEFT PANEL: Understanding */}
                        <div className="w-80 flex flex-col gap-4">
                            <h2 className="font-sans text-sm font-semibold text-gray-300 uppercase tracking-wider mb-2">Understanding Your Situation</h2>
                            
                            <div className="glass-panel rounded-2xl p-6 flex flex-col gap-4">
                                <DataField label="Event Type" value={data.type} icon="⚠" />
                                <DataField label="Asset" value={data.asset} icon="📱" />
                                <DataField label="Location" value={data.location} icon="📍" />
                                <DataField label="Time Frame" value={data.time} icon="⏳" />
                            </div>

                            {/* Dynamic Action Block */}
                            {step === 2 && (
                                <div className="glass-panel border-dashed border-2 p-8 text-center rounded-2xl mt-4 cursor-pointer hover:bg-white/5 transition fade-in" onClick={handleDocumentDrop}>
                                    <div className="text-3xl mb-3">📄</div>
                                    <h3 className="font-sans text-[13px] font-semibold text-gold mb-1">Visual Ingestion</h3>
                                    <p className="text-gray-400 text-[11px] font-mono">Click or Drag Document (FIR)</p>
                                </div>
                            )}
                        </div>

                        {/* CENTER PANEL: Conversational Core */}
                        <div className="flex-1 flex flex-col items-center justify-center -mt-20">
                            
                            {/* The Orb */}
                            <div className="ai-orb-container mb-12 cursor-pointer" onClick={() => step===0 ? triggerListen('initial') : null}>
                                <div className={`orb-rings ${isListening ? 'animate-pulse' : ''}`}></div>
                                <div className={`ai-orb ${isListening ? 'listening' : ''}`}></div>
                            </div>

                            {/* System Text Overlay */}
                            <div className="max-w-md text-center h-24 flex items-center justify-center">
                                <h1 className="font-sans text-2xl font-light text-white leading-relaxed drop-shadow-md">
                                    "{systemText}"
                                </h1>
                            </div>

                            {/* Floating Context Cards */}
                            {step === 1 && (
                                <div className="glass-panel p-6 rounded-2xl w-80 mt-8 text-center fade-in border-gold/50">
                                    <p className="font-mono text-xs text-gray-400 uppercase mb-4">I understood this:</p>
                                    <div className="font-sans text-sm font-medium mb-6 space-y-2 text-left bg-black/20 p-4 rounded-xl">
                                        <div><span className="text-gray-500 mr-2">Loss:</span> {data.asset}</div>
                                        <div><span className="text-gray-500 mr-2">Where:</span> {data.location}</div>
                                        <div><span className="text-gray-500 mr-2">When:</span> {data.time}</div>
                                    </div>
                                    <div className="flex justify-center gap-4 text-xs font-mono">
                                        <div className="px-4 py-2 bg-gold/20 text-gold rounded-full border border-gold/30">✔ Confirm</div>
                                        <div className="px-4 py-2 border border-white/10 text-gray-300 rounded-full">✏ Adjust</div>
                                    </div>
                                </div>
                            )}

                            {/* Review Screen */}
                            {step === 3 && (
                                <div className="glass-panel p-8 rounded-2xl w-96 mt-8 fade-in border-gold/50 shadow-[0_0_50px_rgba(212,175,55,0.15)]">
                                    <p className="font-sans text-lg text-gold font-medium mb-6 text-center">Here is your claim summary:</p>
                                    <div className="space-y-4 font-mono text-xs mb-8">
                                        <div className="flex justify-between border-b border-white/10 pb-2"><span className="text-gray-500">Asset</span><span>{data.asset}</span></div>
                                        <div className="flex justify-between border-b border-white/10 pb-2"><span className="text-gray-500">Event</span><span>{data.type}</span></div>
                                        <div className="flex justify-between border-b border-white/10 pb-2"><span className="text-gray-500">Location</span><span>{data.location}</span></div>
                                        <div className="flex justify-between"><span className="text-gray-500">Proofs</span><span className="text-green-400">FIR.pdf, Telemetry</span></div>
                                    </div>
                                    <button onClick={() => processVoice('submit', 'final_review')} className="w-full py-4 bg-gold text-black font-semibold tracking-wider font-sans rounded-xl hover:bg-yellow-400 transition-colors shadow-[0_0_20px_rgba(212,175,55,0.4)]">
                                        SUBMIT CLAIM
                                    </button>
                                </div>
                            )}

                            {/* Success Screen */}
                            {step === 4 && (
                                <div className="text-center mt-12 fade-in">
                                    <div className="w-20 h-20 bg-green-500/20 border-2 border-green-400 rounded-full flex items-center justify-center text-3xl mx-auto mb-6 shadow-[0_0_40px_rgba(34,197,94,0.4)] text-green-400">✓</div>
                                    <h2 className="text-xl font-mono text-green-400 tracking-widest uppercase">Resolution Active</h2>
                                </div>
                            )}

                        </div>

                        {/* RIGHT PANEL: Live Trust Engine */}
                        <div className="w-80 flex flex-col gap-4">
                            <h2 className="font-sans text-sm font-semibold text-gray-300 uppercase tracking-wider mb-2 text-right">Live Trust Engine</h2>
                            
                            <div className="glass-panel rounded-2xl p-6">
                                <div className="space-y-6">
                                    <VerificationRow label="Identity Verified" status={trust.identity} />
                                    <VerificationRow label="Asset Authenticated" status={trust.asset} />
                                    <VerificationRow label="Incident Validated" status={trust.incident} />
                                    
                                    <div className="pt-6 border-t border-white/10 mt-6">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-sans text-xs text-gray-400">Dynamic Fraud Risk</span>
                                            <span className={`font-mono text-xs font-bold ${trust.risk === 'Low' ? 'text-green-400' : 'text-gold'}`}>{trust.risk}</span>
                                        </div>
                                        <div className="w-full h-1 bg-white/10 rounded-full overflow-hidden">
                                            <div className={`h-full ${trust.risk==='Low'?'w-12 bg-green-400':'w-full bg-gold/50 animate-pulse'}`}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* Footer Waveform */}
                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-3">
                        <div className="waveform">
                            {bars.map((_, i) => (
                                <div key={i} className={`wave-bar ${isListening ? 'active' : ''}`} style={{animationDelay: `${Math.random()}s`}}></div>
                            ))}
                        </div>
                        <span className="font-mono text-[9px] tracking-widest text-gray-500 uppercase">
                            {isListening ? 'SECURE ACOUSTIC CHANNEL OPEN' : 'SYSTEM AWAITING INPUT'}
                        </span>
                    </div>

                </div>
            );
        }

        // Mini Components
        function DataField({label, value, icon}) {
            return (
                <div className="flex items-start gap-4">
                    <div className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex justify-center items-center text-lg">{icon}</div>
                    <div>
                        <div className="font-mono text-[9px] uppercase tracking-widest text-gray-500 mb-1">{label}</div>
                        <div className={`font-sans text-sm font-medium ${value === '-' ? 'text-gray-700' : 'text-white'}`}>{value}</div>
                    </div>
                </div>
            );
        }

        function VerificationRow({label, status}) {
            return (
                <div className="flex justify-between items-center">
                    <span className="font-sans text-[13px] text-gray-300">{label}</span>
                    <span className="text-lg">
                        {status === 'pending' ? <span className="text-gray-600 opacity-50 block animate-spin">◒</span> : 
                         status === 'verified' ? <span className="text-green-400 drop-shadow-[0_0_8px_rgba(34,197,94,0.6)]">✅</span> : ''}
                    </span>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('react-root'));
        root.render(<AeternaApp />);
    </script>
</body>
</html>
