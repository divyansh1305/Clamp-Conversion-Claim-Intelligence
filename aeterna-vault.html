<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeterna Vault - Global AI Insurance Protocol</title>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: '#030712',
                        gold: '#D4AF37',
                        crimson: '#e11d48',
                        neonblue: '#3b82f6',
                        glass: 'rgba(15, 23, 42, 0.4)'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Space Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap');
        body { margin: 0; overflow: hidden; background: #030712; color: white; -webkit-font-smoothing: antialiased;}
        
        #three-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }
        
        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        .gold-border { border-color: rgba(212, 175, 55, 0.4); }

        /* Custom Tilt effect for Selection Cards */
        .tilt-card {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-style: preserve-3d;
        }
        .tilt-card-inner { transform: translateZ(40px); }
        .tilt-card:hover {
            border-color: rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            transform: translateY(-10px) scale(1.02);
            z-index: 20;
        }

        /* The AI Orb Phase 2 */
        .ai-orb-container { width: 140px; height: 140px; position: relative; display: flex; justify-content: center; align-items: center; margin: 0 auto;}
        .ai-orb {
            width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #F5D76E, #9c7c25, #0a0a0a);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), inset -10px -10px 20px rgba(0,0,0,0.8);
            animation: breathe 4s ease-in-out infinite alternate;
        }
        @keyframes breathe {
            0% { transform: scale(0.95); box-shadow: 0 0 20px rgba(212,175,55,0.2); }
            100% { transform: scale(1.05); box-shadow: 0 0 50px rgba(212,175,55,0.6); }
        }
        .ai-orb.listening { 
            animation: pulseRapid 0.6s infinite alternate; 
            background: radial-gradient(circle at 30% 30%, #fff, #F5D76E, #111); 
        }
        @keyframes pulseRapid {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(212,175,55,0.5); }
            100% { transform: scale(1.2); box-shadow: 0 0 80px rgba(255,255,255,0.7); border: 2px solid white; }
        }
        .orb-rings { position:absolute; width:100%; height:100%; border: 1px dashed rgba(212,175,55,0.3); border-radius:50%; animation: spinNode 10s linear infinite; }
        .orb-rings::before { content:''; position:absolute; width:6px; height:6px; background:#D4AF37; border-radius:50%; top:-3px; left:50%; box-shadow: 0 0 10px #D4AF37; }
        @keyframes spinNode { 100% { transform: rotate(360deg); } }

        /* Animation Fades */
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: #D4AF37; box-shadow: 0 0 20px #D4AF37;
            animation: scan 2s linear infinite; opacity: 0; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; opacity: 1; } 90% { top: 100%; opacity: 1; } 100% { top: 100%; opacity: 0; } }

        /* AI Text typed effect */
        .typing-cursor::after { content: '|'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .waveform { display: flex; gap: 3px; align-items: center; height: 30px; justify-content: center;}
        .wave-bar { width: 3px; background: rgba(212,175,55,0.4); border-radius: 2px; height: 4px; transition: 0.1s ease; }
        .wave-bar.active { background: #D4AF37; box-shadow: 0 0 8px #D4AF37; animation: eq 0.4s ease-in-out infinite alternate; }
        @keyframes eq { 0% { height: 4px; } 100% { height: 30px; } }
    </style>
</head>
<body>

    <div id="three-container"></div>
    <div id="react-root" class="relative z-10 w-full h-screen overflow-hidden"></div>

    <!-- Main Logic -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration
        const INSURANCE_DOMAINS = {
            Health: {
                icon: "⚕️",
                desc: "Medical emergencies, hospitalizations, illness.",
                auditReq: "Medical Audit",
                auditItems: "Itemized hospital bills, discharge summary, pharmacy prescriptions."
            },
            Theft: {
                icon: "🛡️",
                desc: "Stolen property, burglary, personal loss.",
                auditReq: "Legal Audit",
                auditItems: "First Information Report (FIR) or Police Report confirming loss."
            },
            Travel: {
                icon: "✈️",
                desc: "Trip cancellations, lost baggage, delays.",
                auditReq: "Logistical Audit",
                auditItems: "Flight confirmation, boarding passes, Airline Irregularity Reports."
            },
            Accident: {
                icon: "🚙",
                desc: "Vehicle collisions, road incidents.",
                auditReq: "Incident Audit",
                auditItems: "Police panchnama (road accident) or certified Medico-Legal Case (MLC)."
            }
        };

        let audioCtx;
        function playSfx(type) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'hover') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'select') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'scan') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        function AeternaApp() {
            // States: 
            // 0 = Select Discipline
            // 1 = Narration (Mic Active)
            // 2 = Analyzing Real-Time Voice (NLP simulation)
            // 3 = Audit Document Request
            // 4 = AI Scanning Document (Finding flaws)
            // 5 = Resolution / Approval
            
            const [phase, setPhase] = useState(0);
            const [selectedType, setSelectedType] = useState(null);
            
            // Audio & Transcription
            const [isListening, setIsListening] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [systemMsg, setSystemMsg] = useState("");
            
            // 4 Essential Fields (Extracted)
            const [extractedData, setExtractedData] = useState({
                kyc: "Awaiting...",
                nexus: "Awaiting...",
                thirdParty: "Awaiting...",
                bankInfo: "Secured & Verified (AES-256)"
            });

            // AI Audit Results
            const [auditResults, setAuditResults] = useState({
                mismatch: "Pending",
                originals: "Pending",
                timeline: "Pending",
                disclosure: "Pending"
            });

            const srRef = useRef(null);

            // TTS
            const speak = (txt, callback) => {
                setSystemMsg(txt);
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(txt);
                u.pitch = 0.95; u.rate = 1.05;
                if(callback) u.onend = callback;
                window.speechSynthesis.speak(u);
            };

            const selectDomain = (type) => {
                playSfx('select');
                setSelectedType(type);
                setPhase(1);
                
                setTimeout(() => {
                    speak(`Aeterna Protocol active for ${type}. Please narrate the exact timeline and nature of the incident.`, () => {
                        triggerMic();
                    });
                }, 800);
            };

            const triggerMic = () => {
                const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
                if(!SpeechRec) return alert("Browser does not support Speech API. Use Chrome/Safari.");
                
                setIsListening(true);
                srRef.current = new SpeechRec();
                srRef.current.continuous = false;
                srRef.current.start();
                
                srRef.current.onresult = (e) => {
                    const txt = e.results[0][0].transcript;
                    setTranscript(txt);
                    setIsListening(false);
                    processTranscription(txt);
                };
                
                srRef.current.onerror = () => {
                    setIsListening(false);
                    speak("I didn't hear that. Please tap the orb and try again.");
                };
            };

            const processTranscription = (txt) => {
                setPhase(2);
                speak("Analyzing forensic nexus of loss via NLP...");
                
                // Simulate "Real AI Data Analysis"
                setTimeout(() => {
                    // Primitive exact extraction logic
                    let location = "Unknown Location";
                    if(txt.toLowerCase().includes('in ') || txt.toLowerCase().includes('at ')) {
                        const words = txt.split(' ');
                        const atIndex = words.findIndex(w => w.toLowerCase() === 'in' || w.toLowerCase() === 'at');
                        if (atIndex !== -1 && words[atIndex+1]) location = words[atIndex+1];
                    }

                    setExtractedData(p => ({
                        ...p,
                        kyc: "Aadhaar / PAN Match Confirmed",
                        nexus: `"${txt.slice(0, 40)}..."`,
                        thirdParty: `Detected Entities: [${location.toUpperCase()}]`
                    }));

                    setPhase(3);
                    const req = INSURANCE_DOMAINS[selectedType].auditReq;
                    const items = INSURANCE_DOMAINS[selectedType].auditItems;
                    speak(`Nexus captured. To satisfy the ${req}, I require the following original proofs: ${items}. Please upload the document.`);
                }, 3000);
            };

            const handleDocumentDrop = () => {
                if(phase !== 3) return;
                playSfx('scan');
                setPhase(4);
                speak("Executing Deep AI Audit. Verifying cryptographic signatures, optical character alignment, and timestamp metadata.");
                
                // Simulate progressive checks for the 4 Pitfalls
                setTimeout(() => setAuditResults(p => ({...p, mismatch: "Passed (100% Name Match)"})), 1500);
                setTimeout(() => setAuditResults(p => ({...p, originals: "Passed (Holographic Seal Valid)"})), 2500);
                setTimeout(() => setAuditResults(p => ({...p, timeline: "Passed (Event within 24h Legal Window)"})), 3500);
                setTimeout(() => setAuditResults(p => ({...p, disclosure: "Passed (No Prior Conflicts)"})), 4500);

                setTimeout(() => {
                    playSfx('select');
                    setPhase(5);
                    speak("The Audit is clean. All 4 statutory requirements are met. The claim has been immutably settled directly to your bank.");
                }, 6000);
            };

            return (
                <div className="flex flex-col h-screen p-8 text-white">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-10 w-full max-w-[1600px] mx-auto z-20">
                        <div className="font-mono text-xl tracking-[0.2em] uppercase text-gold drop-shadow-[0_0_10px_rgba(212,175,55,0.4)]">
                            AETERNA VAULT
                        </div>
                        <div className="font-mono text-xs text-gray-500 border border-white/10 px-4 py-2 rounded-full glass-panel">
                            Statutory AI Compliance Engine v4.0
                        </div>
                    </div>

                    <div className="flex-1 w-full max-w-[1600px] mx-auto z-20 flex flex-col justify-center relative pb-10">
                        
                        {/* PHASE 0: Selection */}
                        {phase === 0 && (
                            <div className="fade-in w-full">
                                <h1 className="text-center font-sans text-3xl font-light mb-4">Establish the Nexus of Loss</h1>
                                <p className="text-center font-mono text-gray-400 text-sm mb-16 tracking-widest uppercase">Select Insurance Discipline to enforce legal audit requirements</p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-8 px-4">
                                    {Object.entries(INSURANCE_DOMAINS).map(([key, data]) => (
                                        <div key={key} 
                                             className="glass-panel p-8 rounded-2xl tilt-card flex flex-col items-center justify-center text-center cursor-pointer min-h-[300px]"
                                             onMouseEnter={() => playSfx('hover')}
                                             onClick={() => selectDomain(key)}>
                                            <div className="text-5xl mb-6 tilt-card-inner">{data.icon}</div>
                                            <h2 className="font-sans text-xl font-medium mb-3 tilt-card-inner text-white">{key}</h2>
                                            <p className="font-mono text-xs text-gray-400 mb-6 tilt-card-inner leading-relaxed">{data.desc}</p>
                                            <div className="border-t border-white/10 pt-4 mt-auto tilt-card-inner w-full">
                                                <span className="text-[10px] uppercase text-gold tracking-widest font-bold block mb-1">Required Audit:</span>
                                                <span className="text-xs text-gray-300 font-mono">{data.auditReq}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* PHASE 1 - 5: Execution Core */}
                        {phase > 0 && (
                            <div className="flex w-full h-full gap-8 justify-between items-stretch fade-in">
                                
                                {/* LEFT: 4 Essential Fields */}
                                <div className="w-[380px] glass-panel p-8 rounded-2xl flex flex-col flex-shrink-0">
                                    <h3 className="font-mono text-xs text-gold uppercase tracking-[0.2em] mb-8 border-b border-white/10 pb-4">Four Essential Fields</h3>
                                    
                                    <div className="flex flex-col gap-6 flex-1 justify-center">
                                        <EssentialField label="KYC Authentication" value={extractedData.kyc} icon="🆔" status={phase >= 3 ? "verified" : "pending"} />
                                        <EssentialField label="The Nexus of Loss" value={extractedData.nexus} icon="📜" status={phase >= 3 ? "verified" : "pending"} />
                                        <EssentialField label="Third-Party Verification" value={extractedData.thirdParty} icon="🏢" status={phase >= 3 ? "verified" : "pending"} />
                                        <EssentialField label="Bank / Settlement Ledger" value={extractedData.bankInfo} icon="🏦" status="verified" />
                                    </div>
                                    <div className="mt-auto pt-6 border-t border-white/10">
                                        <div className="text-xs font-mono text-gray-500">Domain: <span className="text-white">{selectedType}</span></div>
                                    </div>
                                </div>

                                {/* CENTER: AI Orb & Conversation */}
                                <div className="flex-1 flex flex-col items-center justify-center -mt-10 px-8">
                                    {phase <= 3 && (
                                        <div className="ai-orb-container cursor-pointer mb-10" onClick={() => phase !== 2 && triggerMic()}>
                                            <div className="orb-rings"></div>
                                            <div className={`ai-orb ${isListening || phase === 2 ? 'listening' : ''}`}></div>
                                        </div>
                                    )}

                                    {/* Document Upload Zone */}
                                    {phase >= 3 && phase < 5 && (
                                        <div className={`w-[400px] h-[250px] border-2 border-dashed border-gold/40 rounded-2xl glass-panel flex flex-col items-center justify-center cursor-pointer relative overflow-hidden transition hover:bg-white/5 ${phase===4?'animate-pulse border-white/40':''}`} 
                                             onClick={handleDocumentDrop}>
                                            {phase === 4 && <div className="scan-line"></div>}
                                            <div className="text-4xl mb-4">{phase===3 ? '📄' : '🔍'}</div>
                                            <h4 className="font-sans font-medium text-lg text-gold mb-2">{phase === 3 ? `Upload ${INSURANCE_DOMAINS[selectedType].auditReq}` : 'Analyzing Audit Integrity...'}</h4>
                                            <p className="font-mono text-xs text-gray-400 text-center px-8">
                                                {phase === 3 ? `Requirement: ${INSURANCE_DOMAINS[selectedType].auditItems}` : 'Verifying holographic seals and regulatory compliance...'}
                                            </p>
                                        </div>
                                    )}
                                    {phase === 5 && (
                                        <div className="w-[400px] text-center fade-in">
                                            <div className="w-24 h-24 rounded-full border-4 border-green-500 bg-green-500/10 flex items-center justify-center text-5xl mx-auto mb-6 text-green-400 shadow-[0_0_50px_rgba(34,197,94,0.4)]">✓</div>
                                            <h2 className="text-3xl font-sans font-light mb-2 text-white">Full Audit Passed</h2>
                                            <p className="text-gray-400 font-mono text-sm leading-relaxed">Statutory requirements satisfied. Settlement dispatched to ledger.</p>
                                        </div>
                                    )}

                                    {/* Subtitle engine */}
                                    <div className="mt-12 text-center h-[80px]">
                                        <h2 className="font-sans text-2xl md:text-3xl font-light text-white leading-relaxed">
                                            {systemMsg ? `"${systemMsg}"` : ""}
                                        </h2>
                                        {transcript && phase < 3 && (
                                            <div className="mt-4 font-mono text-sm text-gray-400">
                                                Transcribed: <span className="text-white">"{transcript}"</span>
                                            </div>
                                        )}
                                    </div>
                                    
                                    {/* Audio Waveform */}
                                    {phase < 3 && (
                                        <div className="mt-8 waveform">
                                            {Array.from({length:16}).map((_,i) => <div key={i} className={`wave-bar ${isListening?'active':''}`} style={{animationDelay:`${Math.random()*0.5}s`}}></div>)}
                                        </div>
                                    )}
                                </div>

                                {/* RIGHT: Real-time Statutory Audits */}
                                <div className="w-[380px] glass-panel p-8 rounded-2xl flex flex-col flex-shrink-0">
                                    <div className="flex justify-between items-end border-b border-white/10 pb-4 mb-8">
                                        <h3 className="font-mono text-xs text-gold uppercase tracking-[0.2em]">Deep AI Audit log</h3>
                                        <span className="font-mono text-[10px] text-green-400 px-2 py-1 bg-green-900/40 rounded border border-green-500/30">Active</span>
                                    </div>

                                    <div className="flex flex-col gap-6 flex-1">
                                        <AuditCheck label="1. Name / ID Verification" desc="Mismatch Failure Check" status={auditResults.mismatch} />
                                        <AuditCheck label="2. Authenticity Verification" desc="Missing Originals Check" status={auditResults.originals} />
                                        <AuditCheck label="3. Temporal Compliance" desc="Timeline Gaps Check (24-48h)" status={auditResults.timeline} />
                                        <AuditCheck label="4. Regulatory Validation" desc="Non-Disclosure & API Match" status={auditResults.disclosure} />
                                    </div>
                                </div>

                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Mini Components
        function EssentialField({label, value, icon, status}) {
            const isLoading = value === 'Awaiting...';
            return (
                <div className="flex gap-4 items-center">
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center text-xl shrink-0 transition-all ${isLoading ? 'bg-white/5 border border-white/10 grayscale opacity-50' : 'bg-gold/10 border border-gold/40 shadow-[0_0_15px_rgba(212,175,55,0.2)]'}`}>
                        {icon}
                    </div>
                    <div className="flex-1 overflow-hidden">
                        <div className="font-mono text-[9px] uppercase tracking-widest text-gray-500 mb-1 flex justify-between w-full">
                            {label}
                            {status === 'verified' && <span className="text-green-400">✓</span>}
                        </div>
                        <div className={`font-sans text-sm truncate ${isLoading ? 'text-gray-600' : 'text-white'}`}>
                            {value}
                        </div>
                    </div>
                </div>
            );
        }

        function AuditCheck({label, desc, status}) {
            const isPending = status === 'Pending';
            return (
                <div className="border border-white/5 bg-black/20 p-4 rounded-xl relative overflow-hidden group hover:border-gold/30 transition">
                    <div className="font-sans text-sm font-medium text-white mb-1">{label}</div>
                    <div className="font-mono text-[10px] text-gray-500 mb-3">{desc}</div>
                    <div className={`font-mono text-[11px] font-bold ${isPending ? 'text-gray-600' : 'text-green-400 drop-shadow-[0_0_8px_rgba(34,197,94,0.5)]'}`}>
                        {isPending ? 'AWAITING DOCUMENT LAYER...' : status}
                    </div>
                    {!isPending && <div className="absolute top-4 right-4 text-green-400">✅</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-root'));
        root.render(<AeternaApp />);
    </script>

    <!-- Three.js Background Implementation -->
    <script>
        const scene = new THREE.Scene();
        // Dark blue fog like extreme midnight
        scene.fog = new THREE.FogExp2(0x030712, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('three-container').appendChild(renderer.domElement);

        // Grid particles to represent "Legal Data Audits" mapping out
        const geometry = new THREE.BufferGeometry();
        const particlesCount = 2500;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 80;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({
            size: 0.08,
            color: 0xD4AF37, // Gold
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(geometry, material);
        scene.add(particlesMesh);

        // Lines connecting points (Nexus)
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.03 });
        const lineGeo = new THREE.BufferGeometry();
        const lineArr = new Float32Array(500 * 3);
        for(let i=0; i<1500; i++) lineArr[i] = (Math.random() - 0.5) * 60;
        lineGeo.setAttribute('position', new THREE.BufferAttribute(lineArr, 3));
        const lines = new THREE.LineSegments(lineGeo, lineMaterial);
        scene.add(lines);

        // Interactive mouse
        let mouseX = 0; let mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            particlesMesh.rotation.y = elapsedTime * 0.03;
            particlesMesh.rotation.x = elapsedTime * 0.01;
            lines.rotation.y = elapsedTime * -0.02;

            // Follow mouse slightly
            camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
            camera.position.y += (mouseY * 5 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
